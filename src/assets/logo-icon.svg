<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 430">
  <defs>
    <!-- Brand: #2D368E (blue) · #C96C38 (orange) · Font: Myriad Pro -->

    <!-- Running-bond brick pattern anchored to wall top-left (42,232) -->
    <pattern id="brick" x="42" y="232" width="56" height="22" patternUnits="userSpaceOnUse">
      <rect width="56" height="22" fill="#7A3510"/>
      <!-- Row 1 -->
      <rect x="1" y="1"  width="53" height="9" fill="#C96C38"/>
      <!-- Row 2 (half-brick offset) -->
      <rect x="29" y="12" width="53" height="9" fill="#C96C38"/>
      <rect x="-27" y="12" width="53" height="9" fill="#C96C38"/>
    </pattern>
  </defs>

  <!-- ── House ── -->
  <!-- Apex knob -->
  <circle cx="280" cy="24" r="12" fill="#2D368E"/>

  <!-- Roof — wide triangle -->
  <polygon points="280,36 18,230 542,230" fill="#2D368E"/>

  <!-- Wall — orange running-bond brick -->
  <rect x="42" y="228" width="476" height="186" fill="url(#brick)"/>

  <!-- HORIZON — bold white with blue outline -->
  <text
    x="280" y="352"
    font-family="'Myriad Pro', Myriad, 'Gill Sans', Calibri, sans-serif"
    font-weight="bold"
    font-size="90"
    letter-spacing="2"
    text-anchor="middle"
    fill="#ffffff"
    stroke="#2D368E"
    stroke-width="4"
    paint-order="stroke fill">HORIZON</text>

  <!-- "Properties®" -->
  <text
    x="280" y="410"
    font-family="'Myriad Pro', Myriad, 'Gill Sans', Calibri, sans-serif"
    font-style="italic"
    font-weight="bold"
    font-size="48"
    text-anchor="middle"
    fill="#ffffff">Properties&#174;</text>
</svg>
